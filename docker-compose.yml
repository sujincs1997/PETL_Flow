version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3
    container_name: etl_db
    environment:
      POSTGRES_USER: etl_user
      POSTGRES_PASSWORD: etl_password
      POSTGRES_DB: etl_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U etl_user -d etl_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: etl_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: etl_backend
    environment:
      - DATABASE_URL=postgresql://etl_user:etl_password@db:5432/etl_db
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=super_secret_jwt_token_key_change_me
      - INTERMEDIATE_STORAGE_PATH=/tmp/etl_cache
    volumes:
      - ./backend:/app
      - etl_cache:/tmp/etl_cache
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  celery_worker:
    build: ./backend
    container_name: etl_worker
    environment:
      - DATABASE_URL=postgresql://etl_user:etl_password@db:5432/etl_db
      - REDIS_URL=redis://redis:6379/0
      - INTERMEDIATE_STORAGE_PATH=/tmp/etl_cache
    volumes:
      - ./backend:/app
      - etl_cache:/tmp/etl_cache
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A engine.celery_app worker --loglevel=info

  frontend:
    build: ./frontend
    container_name: etl_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
  etl_cache:
